
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="/logo.png" />
      <link rel="apple-touch-icon" href="/logo.png" />
      <link rel="manifest" href="manifest.json" />
      <meta name="theme-color" content="#dc2626" />
      <meta name="description" content="Premium Event Management and Decoration Services" />
      <title>TSD Events & Decor</title>
      
      <script>
        // Store current path in localStorage for service worker to use
        localStorage.setItem('app-path', window.location.pathname || '/');
        
        // Register service worker for dynamic manifest
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
